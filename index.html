<!DOCTYPE html>
<html>
<head>
  <title>قائمة مهامي</title>
  <style>
    body {
      background-color: #1a1a2e;
      color: white;
      font-family: Arial;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }
    h1 {
      color: #00d4ff;
      text-align: center;
    }
    input {
      width: 70%;
      padding: 10px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }
    button {
      padding: 10px 15px;
      background-color: #00d4ff;
      border: none;
      border-radius: 5px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    li {
      background-color: #16213e;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      list-style: none;
    }
  </style>
</head>
<body>

  <h1>📝 قائمة مهامي</h1>

  <input id="مهمة" 
  placeholder="اكتب مهمة جديدة...">
  
  <button onclick="أضف()">إضافة</button>

  <ul id="القائمة"></ul>

  <script>
    function أضف() {
      let نص = document.getElementById("مهمة").value;
      
      if (نص == "") {
        alert("اكتب مهمة أولاً!");
        return;
      }
      
      let قائمة = document.getElementById("القائمة");
      let عنصر = document.createElement("li");
      عنصر.innerHTML = "✅ " + نص;
      قائمة.appendChild(عنصر);
      
      document.getElementById("مهمة").value = "";
    }
  </script>

</body>
</html>
